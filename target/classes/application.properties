spring.application.name=matchFit
server.port=8083

spring.jackson.time-zone=Asia/Seoul

spring.datasource.url=jdbc:mysql://localhost:3307/matchfit?useSSL=false&serverTimezone=UTC

spring.datasource.username=root

spring.datasource.password=rootpassword

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# JWT 설정
jwt.secret=mySecretKeyForMatchFitApplicationThatShouldBeAtLeast32CharactersLongAndSecure2024!
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# 로깅 설정
logging.level.com.matchFit=DEBUG
logging.level.org.springframework.security=DEBUG

# 카카오 OAuth 설정
kakao.client-id=ae217452e8bbfd6450ca5024a003504e
kakao.redirect-uri.signup=http://localhost:8083/api/user/oauth/kakao/callback
kakao.redirect-uri.login=http://localhost:8083/api/user/oauth/kakao/login-callback