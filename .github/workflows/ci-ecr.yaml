name: CI - Build and Deploy via ECR

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  REGISTRY: ${{ secrets.REGISTRY }}
  REPO: ${{ secrets.REPO }}



jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.export-sha.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: maven-cache-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-cache-${{ runner.os }}-

      - name: Create application.properties
        run: |
          mkdir -p ./src/main/resources
          touch ./src/main/resources/application.properties
          echo "${{ secrets.PROPERTIES }}" > ./src/main/resources/application.properties
#           echo "${{ secrets.PROPERTIES }}" | base64 --decode > ./src/main/resources/application.properties
        shell: bash

      - name: Build with Maven
        run: mvn -B -DskipTests package --file pom.xml

      - name: Rename jar
        run: mv ./target/*.jar ./target/app.jar
        
      - name: Check jar file
        run: ls ./target

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set SHORT_SHA env
        id: export-sha
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ env.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.REPO }}:latest

  cd:
    runs-on: ubuntu-latest
    needs: ci
    env:
      SHORT_SHA: ${{ needs.ci.outputs.short_sha }}
      REGISTRY: ${{ secrets.REGISTRY }}
      REPO: ${{ secrets.REPO }}
  
    steps:
      - name: Checkout manifest repository
        uses: actions/checkout@v4
        with:
          repository: CLD-3rd/Final-Team3-manifests
          token: ${{ secrets.GH_TOKEN }}
          ref: feat/app
          path: manifest
  
      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
  
      - name: Update image tag in kustomization.yaml
        run: |
          cd manifest/overlays/dev
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.REPO }}:${{ env.SHORT_SHA }}
  
      - name: Commit and push image tag changes
        run: |
          cd manifest
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/dev/kustomization.yaml
          git commit -m "Update image tag to ${{ env.SHORT_SHA }}" || echo "No changes to commit"
          git push origin feat/app
  
      - name: Generate argocd.env from GitHub Secrets
        run: |
          echo "ENV_SET=${{ secrets.ENV_SET }}" > manifest/overlays/dev/argocd.env
          echo "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}" >> manifest/overlays/dev/argocd.env
          echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> manifest/overlays/dev/argocd.env
          echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> manifest/overlays/dev/argocd.env
          echo "SPRING_DATASOURCE_DRIVER-CLASS-NAME=${{ secrets.SPRING_DATASOURCE_DRIVER_CLASS_NAME }}" >> manifest/overlays/dev/argocd.env
          echo "SPRING_DATA_REDIS_HOST=${{ secrets.SPRING_DATA_REDIS_HOST }}" >> manifest/overlays/dev/argocd.env
          echo "SPRING_DATA_REDIS_PORT=${{ secrets.SPRING_DATA_REDIS_PORT }}" >> manifest/overlays/dev/argocd.env
          echo "SPRING_DATA_REDIS_PASSWORD=${{ secrets.SPRING_DATA_REDIS_PASSWORD }}" >> manifest/overlays/dev/argocd.env
          echo "SPRING_JPA_HIBERNATE_DDL-AUTO=${{ secrets.SPRING_JPA_HIBERNATE_DDL_AUTO }}" >> manifest/overlays/dev/argocd.env

  
      - name: Install kubeseal
        run: |
          KUBESEAL_VERSION=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -LO https://github.com/bitnami-labs/sealed-secrets/releases/download/${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION#v}-linux-amd64.tar.gz
          tar -xzf kubeseal-${KUBESEAL_VERSION#v}-linux-amd64.tar.gz kubeseal
          sudo install -m 755 kubeseal /usr/local/bin/kubeseal
          kubeseal --version



  
      - name: Set up kubeconfig
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
  
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name matchfit-eks \
            --region ap-northeast-2 \
            --role-arn arn:aws:iam::061039804626:role/matchfit-eks-admin-role
  
      - name: Create SealedSecret from argocd.env
        run: |
          cd manifest/overlays/dev
          kubectl create secret generic argocd-env-vars \
            --from-env-file=argocd.env \
            --dry-run=client -o json > argocd-plain-secret.json
  
          kubeseal --format=yaml \
            --controller-name=sealed-secrets \
            --controller-namespace=kube-system \
            --fetch-cert \
            < argocd-plain-secret.json > sealed-secret.yaml
  
          rm -f argocd.env argocd-plain-secret.json
  
      - name: Commit and push SealedSecret
        run: |
          cd manifest
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/dev/sealed-secret.yaml
          git commit -m "Auto: update sealed-secret from argocd.env" || echo "No changes to commit"
          git push origin feat/app
