name: CI - Build and Push Docker Image

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  REGISTRY: ${{ secrets.REGISTRY }}
  REPO: ${{ secrets.REPO }}

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.export-sha.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set SHORT_SHA env
        id: export-sha
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}:${{ env.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.REPO }}:latest

  update-manifest:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout manifest repository
        uses: actions/checkout@v4
        with:
          repository: CLD-3rd/Final-Team3-manifests
          token: ${{ secrets.GH_TOKEN }}
          ref: feat/app
          path: manifest

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag
        run: |
          cd manifest/overlays/dev
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.REPO }}:${{ needs.ci.outputs.short_sha }}

      - name: Commit and push
        run: |
          cd manifest
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update image tag to ${{ needs.ci.outputs.short_sha }}" || echo "No changes"
          git push origin feat/app

