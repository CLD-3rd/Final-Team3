<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 스포츠 메이트</title>
    <!-- Google Fonts - Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
	<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.5/kakao.min.js" integrity="sha384-dok87au0gKqJdxs7msEdBPNnKSRT+/mhTVzq+qOhcL464zXwvcrpjeWvyj1kCdq6" crossorigin="anonymous">

	</script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            padding: 20px 0;
        }

        .container {
            max-width: 700px;
            width: 90%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            margin: 40px; 
        }

        /* 헤더 */
        .header {
            padding: 50px 20px 40px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background:  rgb(94, 172, 172);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .logo {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .app-desc {
            font-size: 16px;
            opacity: 0.9;
            font-weight: 400;
        }

        /* 회원가입 폼 */
        .signup-form {
            padding: 50px 50px;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #64748b;
        }

        /* 소셜 회원가입 */
        .social-signup {
            margin-bottom: 30px;
        }

        .social-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .kakao-btn {
            background: #fee500;
            color: #3c1e1e;
        }

        .kakao-btn:hover {
            background: #fdd835;
        }

        .naver-btn {
            background: #03c75a;
            color: white;
        }

        .naver-btn:hover {
            background: #00b04f;
        }

        .google-btn {
            background: white;
            color: #333;
            border: 2px solid #e2e8f0;
        }

        .google-btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .social-icon {
            font-size: 20px;
        }

        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider-text {
            padding: 0 20px;
            font-size: 14px;
            color: #64748b;
            background: white;
        }

        /* 일반 회원가입 폼 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .form-required {
            color: #ef4444;
            margin-left: 4px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-input:focus {
            outline: none;
            border-color: #408080;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-input.error {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .form-input.success {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .input-wrapper {
            position: relative;
        }

        .input-button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #408080;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-button:hover {
            background: rgb(48, 95, 95);
        }

        .input-button:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #64748b;
            font-size: 16px;
            padding: 5px;
        }

        .password-toggle:hover {
            color: #408080;
        }

        .error-message, .success-message {
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message {
            color: #ef4444;
        }

        .success-message {
            color: #10b981;
        }

        .password-requirements {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
            line-height: 1.4;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .requirement.valid {
            color: #10b981;
        }

        .requirement-icon {
            font-size: 10px;
        }

        /* 성별 선택 */
        .gender-options {
            display: flex;
            gap: 10px;
        }

        .gender-option {
            flex: 1;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .gender-option:hover {
            border-color: #408080;
            background: #f8fafc;
        }

        .gender-option.selected {
            background: linear-gradient(135deg, #408080 0%, #06b6d4 100%);
            color: white;
            border-color: #408080;
        }

        .gender-icon {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .gender-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* 선호 종목 선택 */
        .sports-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .sports-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sports-card:hover {
            border-color: #408080;
            background: #f8fafc;
        }

        .sports-card.selected {
            background: linear-gradient(135deg, #408080 0%, #06b6d4 100%);
            color: white;
            border-color: #408080;
        }

        .sports-icon {
            font-size: 24px;
            margin-bottom: 6px;
            display: block;
        }

        .sports-name {
            font-size: 12px;
            font-weight: 500;
        }

        /* 약관 동의 */
        .terms-section {
            margin-bottom: 30px;
        }

        .terms-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .terms-item:last-child {
            border-bottom: none;
        }

        .terms-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .terms-checkbox.checked {
            background: rgb(64, 128, 128);
            border-color: rgb(64, 128, 128);
            color: white;
        }

        .terms-checkbox.checked::after {
            content: '✓';
            font-size: 14px;
            font-weight: 600;
        }

        .terms-text {
            flex: 1;
            font-size: 14px;
            color: #64748b;
        }

        .terms-text.required {
            color: #2d3748;
        }

        .terms-link {
            color: rgb(64, 128, 128);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-link:hover {
            text-decoration: underline;
        }

        /* 가입 버튼 */
        .signup-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #408080 0%, #06b6d4 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgb(64, 128, 128);
            margin-bottom: 20px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgb(64, 128, 128);
        }

        .signup-btn:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 로그인 링크 */
        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .login-text {
            font-size: 14px;
            color: #64748b;
        }

        .login-btn {
            color: rgb(64, 128, 128);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .login-btn:hover {
            text-decoration: underline;
        }

        /* 로딩 상태 */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
        }

        .loading-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 280px;
            width: 90%;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f4f6;
            border-top: 4px solid #408080;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #64748b;
        }

        /* 반응형 */
        @media (max-width: 480px) {
            .container {
                width: 95%;
                margin: 10px auto;
            }
            
            .signup-form {
                padding: 30px 20px;
            }
            
            .welcome-title {
                font-size: 22px;
            }
            
            .sports-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="header">
            <div class="header-content">
                <div class="logo">⚽</div>
                <div class="app-name">스포츠 메이트</div>
                <div class="app-desc">함께 운동하는 즐거움</div>
            </div>
        </div>

        <!-- 회원가입 폼 -->
        <div class="signup-form">
            <div class="welcome-text">
                <div class="welcome-title">회원가입</div>
                <div class="welcome-subtitle">운동 메이트와 함께 건강한 라이프스타일을 시작하세요</div>
            </div>

            <!-- 소셜 회원가입 -->
            <div class="social-signup">
                <button class="social-btn kakao-btn" onclick="kakaoSignup()">
                    <span class="social-icon">💬</span>
                    <span>카카오로 시작하기</span>
                </button>
            </div>

            <!-- 구분선 -->
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">또는</div>
                <div class="divider-line"></div>
            </div>

            <!-- 일반 회원가입 폼 -->
            <form onsubmit="return handleSignup(event)">
               <!-- 이메일 -->
                <div class="form-group">
                    <label class="form-label">이메일<span class="form-required">*</span></label>
                    <div class="input-wrapper">
                        <input type="email" class="form-input" id="email" placeholder="example@email.com" 
                               oninput="checkEmail()" required>
                        <button type="button" class="input-button" onclick="checkEmailDuplicate()" id="checkEmailBtn">중복확인</button>
                    </div>
                    <div class="error-message" id="emailError"></div>
                    <div class="success-message" id="emailSuccess"></div>
                </div>

                <!-- 비밀번호 -->
                <div class="form-group password-group">
                    <label class="form-label">비밀번호<span class="form-required">*</span></label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="8자 이상, 영문/숫자/특수문자 포함" 
                               oninput="checkPassword()" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">👁️</button>
                    </div>
                    <div class="password-requirements">
                        <div class="requirement" id="lengthReq">
                            <span class="requirement-icon">○</span>
                            <span>8자 이상</span>
                        </div>
                        <div class="requirement" id="letterReq">
                            <span class="requirement-icon">○</span>
                            <span>영문 포함</span>
                        </div>
                        <div class="requirement" id="numberReq">
                            <span class="requirement-icon">○</span>
                            <span>숫자 포함</span>
                        </div>
                        <div class="requirement" id="specialReq">
                            <span class="requirement-icon">○</span>
                            <span>특수문자 포함</span>
                        </div>
                    </div>
                </div>

                <!-- 비밀번호 확인 -->
                <div class="form-group password-confirm-group">
                    <label class="form-label">비밀번호 확인<span class="form-required">*</span></label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" 
                               oninput="checkPasswordConfirm()" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('passwordConfirm')">👁️</button>
                    </div>
                    <div class="error-message" id="passwordConfirmError"></div>
                    <div class="success-message" id="passwordConfirmSuccess"></div>
                </div>

                <!-- 닉네임 -->
                <div class="form-group">
                    <label class="form-label">닉네임<span class="form-required">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" id="nickname" placeholder="2-10자의 한글, 영문, 숫자" 
                               oninput="checkNickname()" required>
                        <button type="button" class="input-button" onclick="checkNicknameDuplicate()" id="checkNicknameBtn">중복확인</button>
                    </div>
                    <div class="error-message" id="nicknameError"></div>
                    <div class="success-message" id="nicknameSuccess"></div>
                </div>

                <!-- 나이 -->
                <div class="form-group">
                    <label class="form-label">나이<span class="form-required">*</span></label>
                    <input type="number" class="form-input" id="age" placeholder="나이를 입력하세요" 
                           min="14" max="100" oninput="checkAge()" required>
                    <div class="error-message" id="ageError"></div>
                    <div class="success-message" id="ageSuccess"></div>
                </div>

                
                <!-- 지역 선택 -->
                <div class="form-group">
                    <label class="form-label">지역<span class="form-required">*</span></label>
                    <div style="display: flex; gap: 10px;">
                        <select class="form-input" id="city" onchange="updateDistricts()" required style="flex: 1;">
                            <option value="">시/도 선택</option>
                            <option value="서울">서울특별시</option>
                            <option value="부산">부산광역시</option>
                            <option value="대구">대구광역시</option>
                            <option value="인천">인천광역시</option>
                            <option value="광주">광주광역시</option>
                            <option value="대전">대전광역시</option>
                            <option value="울산">울산광역시</option>
                            <option value="세종">세종특별자치시</option>
                            <option value="경기">경기도</option>
                            <option value="강원">강원특별자치도</option>
                            <option value="충북">충청북도</option>
                            <option value="충남">충청남도</option>
                            <option value="전북">전북특별자치도</option>
                            <option value="전남">전라남도</option>
                            <option value="경북">경상북도</option>
                            <option value="경남">경상남도</option>
                            <option value="제주">제주특별자치도</option>
                        </select>
                        <select class="form-input" id="district" onchange="checkTown()" required style="flex: 1;" disabled>
                            <option value="">구/군 선택</option>
                        </select>
                    </div>
                    <div class="error-message" id="addressError"></div>
                    <div class="success-message" id="addressSuccess"></div>
                </div>


                <!-- 성별 -->
                <div class="form-group">
                    <label class="form-label">성별<span class="form-required">*</span></label>
                    <div class="gender-options">
                        <div class="gender-option" onclick="selectGender('MALE')">
                            <div class="gender-icon">👨</div>
                            <div class="gender-text">남성</div>
                        </div>
                        <div class="gender-option" onclick="selectGender('FEMALE')">
                            <div class="gender-icon">👩</div>
                            <div class="gender-text">여성</div>
                        </div>
                    </div>
                    <div class="error-message" id="genderError"></div>
                </div>

                <!-- 선호 종목 -->
                <div class="form-group">
                    <label class="form-label">선호 종목<span class="form-required">*</span></label>
                    <div class="sports-grid">
                        <div class="sports-card" onclick="selectsports('FOOTBALL')">
                            <span class="sports-icon">⚽</span>
                            <div class="sports-name">축구</div>
                        </div>
                        <div class="sports-card" onclick="selectsports('TENNIS')">
                            <span class="sports-icon">🎾</span>
                            <div class="sports-name">테니스</div>
                        </div>
                        <div class="sports-card" onclick="selectsports('TABLE_TENNIS')">
                            <span class="sports-icon">🏓</span>
                            <div class="sports-name">탁구</div>
                        </div>
                        <div class="sports-card" onclick="selectsports('BASKETBALL')">
                            <span class="sports-icon">🏀</span>
                            <div class="sports-name">농구</div>
                        </div>
                        <div class="sports-card" onclick="selectsports('BADMINTON')">
                            <span class="sports-icon">🏸</span>
                            <div class="sports-name">배드민턴</div>
                        </div>
                        <div class="sports-card" onclick="selectsports('VOLLEYBALL')">
                            <span class="sports-icon">🏐</span>
                            <div class="sports-name">배구</div>
                        </div>
                    </div>
                    <div class="error-message" id="sportsError"></div>
                </div>

                <!-- 약관 동의 -->
                <!-- <div class="terms-section">
                    <div class="terms-item">
                        <div class="terms-checkbox" onclick="toggleTerms('all')" id="termsAll"></div>
                        <div class="terms-text required">전체 약관에 동의합니다</div>
                    </div>
                    <div class="terms-item">
                        <div class="terms-checkbox" onclick="toggleTerms('service')" id="termsService"></div>
                        <div class="terms-text required">
                            <a href="#" class="terms-link">서비스 이용약관</a> 동의 (필수)
                        </div>
                    </div>
                    <div class="terms-item">
                        <div class="terms-checkbox" onclick="toggleTerms('privacy')" id="termsPrivacy"></div>
                        <div class="terms-text required">
                            <a href="#" class="terms-link">개인정보 처리방침</a> 동의 (필수)
                        </div>
                    </div>
                    <div class="terms-item">
                        <div class="terms-checkbox" onclick="toggleTerms('age')" id="termsAge"></div>

		function updateDistricts() {
		    const citySelect = document.getElementById('city');
		    const districtSelect = document.getElementById('district');
		    const selectedCity = citySelect.value;
		    
		    // 구/군 초기화
		    districtSelect.innerHTML = '<option value="">구/군 선택</option>';
		    districtSelect.disabled = !selectedCity;
		    
		    if (selectedCity && districtData[selectedCity]) {
		        districtData[selectedCity].forEach(district => {
		            const option = document.createElement('option');
		            option.value = district;
		            option.textContent = district;
		            districtSelect.appendChild(option);
		        });
		        districtSelect.disabled = false;
		    }
		    
		    // 주소 유효성 검사 재실행
		    checkTown();
		}

		// 이메일 유효성 검사
		function checkEmail() {
		    const email = document.getElementById('email').value;
		    const emailInput = document.getElementById('email');
		    const errorElement = document.getElementById('emailError');
		    const successElement = document.getElementById('emailSuccess');
		    
		    // 이메일 변경시 중복확인 상태 초기화
		    validationState.emailChecked = false;
		    document.getElementById('checkEmailBtn').disabled = false;
		    
		    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
		    
		    if (email.length === 0) {
		        hideMessages(errorElement, successElement);
		        emailInput.className = 'form-input';
		        validationState.email = false;
		    } else if (!emailRegex.test(email)) {
		        showError(errorElement, successElement, '올바른 이메일 형식을 입력하세요');
		        emailInput.className = 'form-input error';
		        validationState.email = false;
		    } else {
		        showSuccess(errorElement, successElement, '올바른 형식입니다');
		        emailInput.className = 'form-input success';
		        validationState.email = true;
		    }
		    
		    updateSignupButton();
		}
		
		// 이메일 중복 확인
		async function checkEmailDuplicate() {
		    const email = document.getElementById('email').value;
		    const errorElement = document.getElementById('emailError');
		    const successElement = document.getElementById('emailSuccess');
		    const btn = document.getElementById('checkEmailBtn');
		    
		    if (!validationState.email) {
		        showError(errorElement, successElement, '올바른 이메일 형식을 입력하세요');
		        return;
		    }
		    
		    btn.disabled = true;
		    btn.textContent = '확인중...';
		    
		    try {
		        const response = await fetch('/api/user/check-email', {
		            method: 'POST',
		            headers: {
		                'Content-Type': 'application/json',
		            },
		            body: JSON.stringify({ email: email })
		        });
		        
		        if (response.ok) {
		            showSuccess(errorElement, successElement, '사용 가능한 이메일입니다');
		            validationState.emailChecked = true;
		        } else {
		            showError(errorElement, successElement, '이미 사용중인 이메일입니다');

		        showSuccess(errorElement, successElement, '사용 가능한 이메일입니다'); // 개발용
		        validationState.emailChecked = true;

		// 비밀번호 유효성 검사
		function checkPassword() {
		    const password = document.getElementById('password').value;
		    const passwordInput = document.getElementById('password');
		    
		    // 요구사항 체크
		    const lengthValid = password.length >= 8;
		    const letterValid = /[a-zA-Z]/.test(password);
		    const numberValid = /[0-9]/.test(password);
		    const specialValid = /[!@#$%^&*(),.?":{}|<>]/.test(password);
		    
		    // 요구사항 UI 업데이트
		    updateRequirement('lengthReq', lengthValid);
		    updateRequirement('letterReq', letterValid);
		    updateRequirement('numberReq', numberValid);
		    updateRequirement('specialReq', specialValid);
		    
		    // 전체 유효성 확인
		    const allValid = lengthValid && letterValid && numberValid && specialValid;
		    validationState.password = allValid;
		    
		    if (password.length === 0) {
		        passwordInput.className = 'form-input';
		    } else if (allValid) {
		        passwordInput.className = 'form-input success';
		    } else {
		        passwordInput.className = 'form-input error';
		    }
		    
		    // 비밀번호 확인 재검사
		    if (document.getElementById('passwordConfirm').value) {
		        checkPasswordConfirm();
		    }
		    
		    updateSignupButton();
		}

		function checkPasswordConfirm() {
		    const password = document.getElementById('password').value;
		    const passwordConfirm = document.getElementById('passwordConfirm').value;
		    const confirmInput = document.getElementById('passwordConfirm');
		    const errorElement = document.getElementById('passwordConfirmError');
		    const successElement = document.getElementById('passwordConfirmSuccess');
		    
		    if (passwordConfirm.length === 0) {
		        hideMessages(errorElement, successElement);
		        confirmInput.className = 'form-input';
		        validationState.passwordConfirm = false;
		    } else if (password !== passwordConfirm) {
		        showError(errorElement, successElement, '비밀번호가 일치하지 않습니다');
		        confirmInput.className = 'form-input error';
		        validationState.passwordConfirm = false;
		    } else {
		        showSuccess(errorElement, successElement, '비밀번호가 일치합니다');
		        confirmInput.className = 'form-input success';
		        validationState.passwordConfirm = true;
		    }
		    
		    updateSignupButton();
		}

		    }
		    
		    btn.disabled = false;
		    btn.textContent = '중복확인';
		    updateSignupButton();
		}
		
		// 나이 검사
		function checkAge() {
		    const age = parseInt(document.getElementById('age').value);
		    const ageInput = document.getElementById('age');
		    const errorElement = document.getElementById('ageError');
		    const successElement = document.getElementById('ageSuccess');
		    
		    if (isNaN(age)) {
		        hideMessages(errorElement, successElement);
		        ageInput.className = 'form-input';
		        validationState.age = false;
		    } else if (age < 14 || age > 100) {
		        showError(errorElement, successElement, '14세 이상 100세 이하만 가입 가능합니다');
		        ageInput.className = 'form-input error';
		        validationState.age = false;
		    } else {
		        showSuccess(errorElement, successElement, '올바른 나이입니다');
		        ageInput.className = 'form-input success';
		        validationState.age = true;
		    }
		    
		    updateSignupButton();
		}
		
		// 성별 선택
		function selectGender(gender) {
		    document.querySelectorAll('.gender-option').forEach(option => {
		        option.classList.remove('selected');
		    });
		    
		    event.target.closest('.gender-option').classList.add('selected');
		    selectedGender = gender;
		    validationState.gender = true;
		    
		    const errorElement = document.getElementById('genderError');
		    hideMessages(errorElement, null);
		    
		    updateSignupButton();
		}
		
		// 스포츠 선택 (함수명 수정)
		function selectsports(sports) {
		    document.querySelectorAll('.sports-card').forEach(card => {
		        card.classList.remove('selected');
		    });
		    
		    event.target.closest('.sports-card').classList.add('selected');
		    selectedSports = sports;  // selectedsports -> selectedSports로 수정
		    validationState.sports = true;
		    
		    const errorElement = document.getElementById('sportsError');
		    hideMessages(errorElement, null);
		    
		    updateSignupButton();
		}
		
		// 비밀번호 표시/숨김 토글
		function togglePassword(inputId) {
		    const input = document.getElementById(inputId);
		    const button = event.target;
		    
		    if (input.type === 'password') {
		        input.type = 'text';
		        button.textContent = '🙈';
		    } else {
		        input.type = 'password';
		        button.textContent = '👁️';
		    }
		}
		
		// 요구사항 UI 업데이트
		function updateRequirement(id, isValid) {
		    const element = document.getElementById(id);
		    const icon = element.querySelector('.requirement-icon');
		    
		    if (isValid) {
		        element.classList.add('valid');
		        icon.textContent = '✓';
		    } else {
		        element.classList.remove('valid');
		        icon.textContent = '○';
		    }
		}
		
		// 에러/성공 메시지 표시
		function showError(errorElement, successElement, message) {
		    errorElement.textContent = message;
		    errorElement.style.display = 'block';
		    if (successElement) successElement.style.display = 'none';
		}
		
		function showSuccess(errorElement, successElement, message) {
		    successElement.textContent = message;
		    successElement.style.display = 'block';
		    errorElement.style.display = 'none';
		}
		
		function hideMessages(errorElement, successElement) {
		    errorElement.style.display = 'none';
		    if (successElement) successElement.style.display = 'none';
		}
		
		// 회원가입 버튼 상태 업데이트
		function updateSignupButton() {
		    const signupBtn = document.getElementById('signupBtn');
		    const isValid = validationState.email && 
		                   validationState.emailChecked &&
		                   validationState.password && 
		                   validationState.passwordConfirm &&
		                   validationState.nickname && 
		                   validationState.nicknameChecked &&
		                   validationState.age &&
		                   validationState.town &&
		                   validationState.gender && 
		                   validationState.sports ;
		                  
		    
		    signupBtn.disabled = !isValid;
		    
		    // 디버깅용 로그
		    console.log('Validation State:', validationState);
		    console.log('Button enabled:', isValid);
		}
		
		
		// 로그인 페이지로 이동
		function goToLogin() {
		    window.location.href = '/login';
		}
		
		// 회원가입 처리
		async function handleSignup(event) {
		    event.preventDefault();
		    
		    // 최종 유효성 검사
		    if (!selectedGender) {
		        showError(document.getElementById('genderError'), null, '성별을 선택하세요');
		        return false;
		    }
		    
		    if (!selectedSports) {
		        showError(document.getElementById('sportsError'), null, '선호 종목을 선택하세요');
		        return false;
		    }
		    
		    // 로딩 표시
		    document.getElementById('loadingModal').style.display = 'block';
		    
		    // 주소 조합 (수정됨)
		    const city = document.getElementById('city').value;
		    const district = document.getElementById('district').value;
		    const fullAddress = `${city} ${district}`;
		    
		    // 카카오 사용자 여부 확인 
		    const emailInput = document.getElementById('email');
		    const isKakaoUser = emailInput.readOnly || validationState.isKakaoUser;
    
		    // 회원가입 데이터 준비
		    const signupData = {
		        email: document.getElementById('email').value,
		        password: document.getElementById('password').value,
		        nickname: document.getElementById('nickname').value,
		        age: parseInt(document.getElementById('age').value),
		        town: fullAddress,  // 조합된 주소 사용
		        gender: selectedGender,
		        sports: selectedSports,
		        isKakaoUser: isKakaoUser
		    };
		    
		    try {
		        const response = await fetch('/api/user/signup', {
		            method: 'POST',
		            headers: {
		                'Content-Type': 'application/json',
		            },
		            body: JSON.stringify(signupData)
		        });
		        
		        if (response.ok) {
		            const result = await response.text();
		            document.getElementById('message').innerHTML = 
		                '<div style="color: #10b981; font-size: 16px;">✅ ' + result + '</div>';
		            
		            // 성공시 로그인 페이지로 이동
		            setTimeout(() => {
		                window.location.href = '/login';
		            }, 2000);
		        } else {
		            const error = await response.text();
		            document.getElementById('message').innerHTML = 
		                '<div style="color: #ef4444; font-size: 16px;">❌ ' + error + '</div>';
		        }
		    } catch (error) {
		        document.getElementById('message').innerHTML = 
		            '<div style="color: #ef4444; font-size: 16px;">❌ 회원가입 중 오류가 발생했습니다.</div>';
		    }
		    
		    // 로딩 숨김
		    document.getElementById('loadingModal').style.display = 'none';
		    
		    return false;
		}
    </script>
    </body>
</html>
