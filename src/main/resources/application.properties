spring.application.name=matchFit

server.port=8080

#app.base-url=http://localhost:8080


# DB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/finaltest?serverTimezone=Asia/Seoul
spring.datasource.username=finaltest
spring.datasource.password=finaltest1234

# JPA
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true


#redis
spring.data.redis.host=localhost
spring.data.redis.client-name=default
spring.data.redis.password=redis1234
spring.data.redis.port=6379
spring.data.redis.timeout=2000


jwt.secret=mySecretKeyForMatchFitApplicationThatShouldBeAtLeast32CharactersLongAndSecure2025!
jwt.expiration=86400000
jwt.refresh.expiration=604800000


# 로깅 
logging.level.com.matchFit=DEBUG
logging.level.org.springframework.security=DEBUG

