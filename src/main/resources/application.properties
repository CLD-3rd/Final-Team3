spring.application.name=matchFit
server.port=8083

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3307/matchFit?serverTimezone=Asia/Seoul
spring.datasource.username=matchFit
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

#redis
spring.data.redis.host=localhost
spring.data.redis.client-name=default
spring.data.redis.password=redis1234
spring.data.redis.port=6379
spring.data.redis.timeout=2000


# JWT
jwt.secret=mySecretKeyForMatchFitApplicationThatShouldBeAtLeast32CharactersLongAndSecure2025!
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# 로깅 
logging.level.com.matchFit=DEBUG
logging.level.org.springframework.security=DEBUG
