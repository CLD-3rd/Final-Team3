spring.application.name=matchFit

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/finaltest?serverTimezone=Asia/Seoul
spring.datasource.username=finaltest
spring.datasource.password=finaltest1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

#redis
spring.data.redis.host=127.0.0.1
spring.data.redis.client-name=default
spring.data.redis.password=
spring.data.redis.port=6379
#spring.data.redis.ssl.enabled=false
spring.data.redis.timeout=2000

# JWT
jwt.secret=mySecretKeyForMatchFitApplicationThatShouldBeAtLeast32CharactersLongAndSecure2025!
jwt.expiration=86400000
jwt.refresh.expiration=604800000

logging.level.com.matchFit=DEBUG
logging.level.org.springframework.security=DEBUG

kakao.client-id=ae217452e8bbfd6450ca5024a003504e
kakao.redirect-uri.signup=http://localhost:8080/api/user/oauth/kakao/callback
kakao.redirect-uri.login=http://localhost:8080/api/user/oauth/kakao/login-callback

# AWS S3
aws.s3.bucket=matchfit-bucket
aws.s3.region=ap-northeast-2
aws.credentials.access-key=1
aws.credentials.secret-key=1

# Prometheus 
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

