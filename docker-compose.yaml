
services:
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: redis-server --requirepass redis1234 --notify-keyspace-events Ex
    volumes:
      - redis_volume_data:/data
    ports:
      - 6379:6379

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: redis_insight
    restart: always
    volumes:
      - redis_insight_volume_data:/db
    ports: 
      - 5540:5540

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: matchFit
      MYSQL_USER: username
      MYSQL_PASSWORD: password
    volumes:
      - mysql_volume_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql_exporter
    command:
      - "--config.my-cnf=/etc/.my.cnf"
      - "--collect.perf_schema.eventsstatements"
    environment:
      DATA_SOURCE_NAME: "exporter:exporter_password@(mysql:3306)/"
    volumes:
      - ./docker/mysql/exporter.my.cnf:/etc/.my.cnf:ro
    ports:
      - "9104:9104"
    depends_on:
      - mysql
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - mysql-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_volume_data:
  redis_insight_volume_data:
  mysql_volume_data:
  prometheus_data:
  grafana_data:
